name: Bug report
description: Report a reproducible Threadsaw defect using synthetic or sanitized data.
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: version
    attributes: {label: Threadsaw version}
    validations: {required: true}
  - type: dropdown
    id: platform
    attributes: {label: Platform, options: [Windows, macOS, Linux]}
    validations: {required: true}
  - type: textarea
    id: steps
    attributes: {label: Reproduction steps}
    validations: {required: true}
  - type: textarea
    id: expected
    attributes: {label: Expected behavior}
  - type: textarea
    id: actual
    attributes: {label: Actual behavior and sanitized logs}
    validations: {required: true}
  - type: checkboxes
    id: privacy
    attributes:
      label: Evidence safety
      options:
        - label: I have not attached real client evidence, credentials, or malicious binaries.
          required: true
