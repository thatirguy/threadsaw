name: Feature request
description: Propose an offline, static-analysis improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes: {label: Investigation problem}
    validations: {required: true}
  - type: textarea
    id: proposal
    attributes: {label: Proposed behavior}
    validations: {required: true}
  - type: textarea
    id: security
    attributes: {label: Offline/security implications}
