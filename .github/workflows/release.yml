name: Publish release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  python-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Verify tag and package versions
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          module_version="$(PYTHONPATH=src python -c 'import threadsaw; print(threadsaw.__version__)')"
          test "$tag_version" = "$package_version"
          test "$tag_version" = "$module_version"
          echo "RELEASE_VERSION=$tag_version" >> "$GITHUB_ENV"

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install "build==1.5.1"
          python -m build

      - name: Validate the installed wheel
        shell: bash
        run: |
          set -euo pipefail
          python -m venv release-venv
          release-venv/bin/python -m pip install --upgrade pip
          release-venv/bin/python -m pip install dist/*.whl
          test "$(release-venv/bin/threadsaw --version)" = "threadsaw ${RELEASE_VERSION}"
          release-venv/bin/python -c 'from importlib.resources import files; assert files("threadsaw").joinpath("data/public_suffix_list.dat").is_file()'

      - name: Add source SBOM and checksums
        shell: bash
        run: |
          set -euo pipefail
          cp SBOM.cdx.json "dist/threadsaw-${RELEASE_VERSION}-source.sbom.cdx.json"
          cd dist
          sha256sum threadsaw-* > SHA256SUMS.txt

      - name: Attest Python release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/SHA256SUMS.txt

      - name: Upload release files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-files
          path: |
            dist/threadsaw-*.whl
            dist/threadsaw-*.tar.gz
            dist/threadsaw-*.cdx.json
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

  container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Generate container metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and publish the default container
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            THREADSAW_INSTALL_MSG=0
            THREADSAW_VERSION=${{ steps.meta.outputs.version }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest the published container
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  github-release:
    needs:
      - python-artifacts
      - container
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download release files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-files
          path: release-files

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" release-files/* \
            --verify-tag \
            --latest \
            --title "Threadsaw ${GITHUB_REF_NAME#v}" \
            --notes-file docs/RELEASE_NOTES_1.3.0.md
