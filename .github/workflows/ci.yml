name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '${{ matrix.python-version }}'}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[msg,dev]"
      - run: python -m pytest -q
      - run: python -m build
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t threadsaw:test .
      - run: docker run --rm --network none threadsaw:test --version
